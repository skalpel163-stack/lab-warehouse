<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Выкуп склад — Лаборатория Ремонта</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/core@1.0.0-beta20/dist/css/tabler.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.12.0/dist/tabler-icons.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/brand.css">
<style>
    .table > :not(caption) > * > * { padding: 5px 8px; font-size: 12.5px; }
    .table thead th { padding: 7px 8px; }
</style>
</head>
<body>

<div class="page">
    <div id="navbar-slot"></div>

    <div class="page-wrapper">
        <div class="container-xl py-3">

            <!-- Header -->
            <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
                <div>
                    <h2 class="mb-0">
                        <i class="ti ti-cash me-2" style="color:#00c853;"></i>Выкуп склад
                    </h2>
                    <div class="text-muted">Выкупленная техника на продажу</div>
                </div>
                <div class="d-flex gap-2">
                    <button class="btn btn-yellow admin-only" style="display:none;" onclick="openAddModal()">
                        <i class="ti ti-plus"></i> Добавить
                    </button>
                    <button class="btn btn-outline-primary" onclick="exportCSV()">
                        <i class="ti ti-download"></i> Экспорт
                    </button>
                </div>
            </div>

            <!-- Stats -->
            <div class="stats-strip mb-3">
                <div class="stats-strip-item">
                    <span class="stats-strip-value" id="stat-total">0</span>
                    <span class="stats-strip-label">позиций</span>
                </div>
                <div class="stats-strip-dot"></div>
                <div class="stats-strip-item">
                    <span class="stats-strip-value" id="stat-qty">0</span>
                    <span class="stats-strip-label">штук</span>
                </div>
                <div class="stats-strip-dot"></div>
                <div class="stats-strip-item stats-strip-total">
                    <span class="stats-strip-value" id="stat-value">0 ₽</span>
                    <span class="stats-strip-label">стоимость</span>
                </div>
                <div class="stats-strip-dot"></div>
                <div class="stats-strip-item">
                    <span class="stats-strip-value" id="stat-no-photo">0</span>
                    <span class="stats-strip-label">без фото</span>
                </div>
            </div>

            <!-- Search -->
            <div class="card mb-3">
                <div class="card-body p-2">
                    <input type="text" class="form-control" id="search" placeholder="Поиск..." oninput="debounceSearch()">
                </div>
            </div>

            <!-- Table view -->
            <div class="card">
                <div class="table-responsive">
                    <table class="table table-vcenter table-hover">
                        <thead id="items-thead"></thead>
                        <tbody id="items-tbody">
                            <tr><td colspan="10" class="text-center text-muted py-5">Загрузка...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>
</div>

<!-- Product Detail Modal -->
<div class="modal modal-blur fade" id="product-modal" tabindex="-1">
    <div class="modal-dialog modal-xl modal-dialog-scrollable">
        <div class="modal-content" id="product-modal-content"></div>
    </div>
</div>

<!-- Add modal -->
<div class="modal modal-blur fade" id="add-vykup-modal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Добавить на Выкуп склад</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form onsubmit="submitAdd(event)">
                <div class="modal-body">
                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label class="form-label required">Название</label>
                                <input type="text" class="form-control" id="aa-name" required placeholder="Стиральная машина Bosch...">
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="mb-3">
                                <label class="form-label required">Кол-во</label>
                                <input type="number" class="form-control" id="aa-qty" required value="1" min="1">
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="mb-3">
                                <label class="form-label required">Цена, ₽</label>
                                <input type="number" class="form-control" id="aa-price" required placeholder="15000">
                            </div>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label class="form-label">Место хранения</label>
                                <input type="text" class="form-control" id="aa-location" placeholder="Склад, гараж...">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label class="form-label">Ответственный</label>
                                <select class="form-select" id="aa-responsible"></select>
                            </div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Примечание</label>
                        <textarea class="form-control" id="aa-notes" rows="2" placeholder="Описание, состояние..."></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Фото</label>
                        <div style="border:2px dashed var(--lr-border);border-radius:12px;padding:20px;text-align:center;cursor:pointer;background:var(--lr-bg);" onclick="document.getElementById('aa-photo').click()">
                            <i class="ti ti-camera-plus" style="font-size:32px;color:var(--lr-text-muted);"></i>
                            <p class="text-muted mt-1 mb-0" style="font-size:12px;">Нажмите для загрузки</p>
                            <img id="aa-photo-preview" style="max-width:100%;max-height:150px;display:none;border-radius:8px;margin-top:8px;">
                        </div>
                        <input type="file" id="aa-photo" accept="image/*" style="display:none" onchange="previewPhoto(this)">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-link link-secondary" data-bs-dismiss="modal">Отмена</button>
                    <button type="submit" class="btn btn-yellow"><i class="ti ti-plus"></i> Добавить</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Write-off modal -->
<div class="modal modal-blur fade" id="writeoff-vykup-modal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Списать / Продано</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form onsubmit="submitWriteOff(event)">
                <div class="modal-body">
                    <input type="hidden" id="awo-code">
                    <input type="hidden" id="awo-warehouse">
                    <div class="mb-3">
                        <label class="form-label">Товар</label>
                        <input type="text" class="form-control" id="awo-name" readonly style="background:var(--lr-bg);">
                    </div>
                    <div class="mb-3">
                        <label class="form-label required">Количество</label>
                        <input type="number" class="form-control" id="awo-qty" required value="1" min="1">
                    </div>
                    <div class="mb-3">
                        <label class="form-label required">Причина</label>
                        <input type="text" class="form-control" id="awo-reason" required placeholder="Продано / возврат на склад">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-link link-secondary" data-bs-dismiss="modal">Отмена</button>
                    <button type="submit" class="btn btn-danger"><i class="ti ti-file-minus"></i> Списать</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Lightbox -->
<div class="lightbox-overlay" id="lightbox" onclick="if(event.target===this)this.classList.remove('active')">
    <button class="lightbox-close" onclick="document.getElementById('lightbox').classList.remove('active')">&times;</button>
    <img id="lightbox-img" src="">
</div>

<input type="file" id="detail-photo-input" accept="image/*" style="display:none" onchange="uploadPhotoForCurrent(this)">

<script src="https://cdn.jsdelivr.net/npm/@tabler/core@1.0.0-beta20/dist/js/tabler.min.js"></script>
<script src="assets/auth.js"></script>
<script src="assets/nav.js"></script>
<script src="assets/app.js"></script>
<script src="assets/api.js"></script>
<script>
const currentUser = Auth.require();
initNavbar('vykup');

if (Auth.isAdmin()) {
    document.querySelectorAll('.admin-only').forEach(el => el.style.display = '');
}

let allItems = [];
let vykupItems = [];
let searchTimer = null;
let currentDetailCode = null;

document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('items-thead').innerHTML = `<tr>
        <th style="width:36px;">№</th>
        <th style="width:48px;">Фото</th>
        <th>Название</th>
        <th>Место хранения</th>
        <th style="width:70px;">Кол-во</th>
        <th style="width:100px;">Цена</th>
        <th>Примечание</th>
        <th style="width:100px;">Сумма</th>
        <th>Ссылка</th>
        ${Auth.isAdmin() ? `<th style="width:160px;" class="text-end">Действия</th>` : ''}
    </tr>`;
    loadData();
});

async function loadData() {
    try {
        allItems = await fetchWarehouseData();
        vykupItems = allItems.filter(i =>
            (i.locация && (i.locация === 'Выкуп склад' || i.locация === 'ВЫКУП' || i.locация.toUpperCase() === 'ВЫКУП')) ||
            (i.notes && i.notes.toLowerCase().includes('выкуп')) ||
            (i.item_code && i.item_code.toUpperCase().includes('ВЫКУП'))
        );
        updateStats();
        renderItems();
    } catch (e) {
        console.error(e);
        toast('Ошибка загрузки', 'error');
    }
}

function updateStats() {
    const totalQty = vykupItems.reduce((s, i) => s + i.actual_qty, 0);
    const totalVal = vykupItems.reduce((s, i) => s + (i.stock_value || i.actual_qty * i.valuation_rate), 0);
    const noPhoto = vykupItems.filter(i => !i.image).length;
    document.getElementById('stat-total').textContent = vykupItems.length;
    document.getElementById('stat-qty').textContent = totalQty;
    document.getElementById('stat-value').textContent = formatPrice(totalVal);
    document.getElementById('stat-no-photo').textContent = noPhoto;
}

function debounceSearch() {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(renderItems, 300);
}

function renderItems() {
    const search = (document.getElementById('search').value || '').toLowerCase();

    let filtered = vykupItems.filter(i =>
        !search ||
        i.item_name.toLowerCase().includes(search) ||
        i.item_code.toLowerCase().includes(search) ||
        (i.article && i.article.toLowerCase().includes(search)) ||
        (i.notes && i.notes.toLowerCase().includes(search))
    );

    filtered.sort((a, b) => a.item_name.localeCompare(b.item_name, 'ru'));

    const colCount = Auth.isAdmin() ? 10 : 9;
    const tbody = document.getElementById('items-tbody');
    if (!filtered.length) {
        tbody.innerHTML = `<tr><td colspan="${colCount}" class="text-center text-muted py-5">
            <i class="ti ti-cash" style="font-size:48px;opacity:0.3;"></i>
            <div class="mt-2">${search ? 'Ничего не найдено' : 'Нет товаров'}</div>
        </td></tr>`;
        return;
    }

    tbody.innerHTML = filtered.map((item, idx) => {
        const img = item.image
            ? `<img src="${API.imgUrl(item.image)}" style="width:36px;height:36px;object-fit:cover;border-radius:6px;cursor:pointer;" onclick="event.stopPropagation();openLightbox('${API.imgUrl(item.image)}')">`
            : `<div style="width:36px;height:36px;background:var(--lr-bg-elevated);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--lr-text-muted);cursor:pointer;" onclick="event.stopPropagation();uploadPhotoFor('${item.item_code}')"><i class="ti ti-camera-plus"></i></div>`;

        const actionBtns = Auth.isAdmin() ? `
            <button class="btn btn-sm btn-outline-warning" onclick="event.stopPropagation();openWriteOff('${item.item_code}','${escHtml(item.item_name).replace(/'/g,"\\'")}','${item.warehouse}',${item.actual_qty})"><i class="ti ti-file-minus"></i> Продано</button>
            <button class="btn btn-sm btn-outline-danger" onclick="event.stopPropagation();confirmDelete('${item.item_code}','${escHtml(item.item_name).replace(/'/g,"\\'")}')"><i class="ti ti-trash"></i></button>
        ` : '';

        return `
            <tr style="cursor:pointer;" onclick="openProduct('${item.item_code}')">
                <td style="color:var(--lr-text-muted);font-size:12px;text-align:center;">${idx + 1}</td>
                <td onclick="event.stopPropagation()">${img}</td>
                <td>
                    <div style="font-weight:500;font-size:13px;">${escHtml(item.item_name)}</div>
                    ${item.responsible ? `<div style="font-size:11px;color:var(--lr-text-muted);">${escHtml(item.responsible)}</div>` : ''}
                </td>
                <td onclick="event.stopPropagation()"><small class="editable-note" style="color:var(--lr-text-muted);cursor:pointer;" onclick="editLocation('${item.item_code}', this)" title="Нажмите чтобы редактировать">${item.locация ? escHtml(item.locация) : '<span style="opacity:0.4;">+ место</span>'}</small></td>
                <td><span class="badge bg-green-lt">${item.actual_qty} шт.</span></td>
                <td style="font-size:13px;">${formatPrice(item.valuation_rate)}</td>
                <td onclick="event.stopPropagation()"><small class="editable-note" style="color:var(--lr-text-muted);cursor:pointer;" onclick="editNote('${item.item_code}', this)" title="Нажмите чтобы редактировать">${item.notes ? escHtml(item.notes).substring(0, 40) + (item.notes.length > 40 ? '...' : '') : '<span style="opacity:0.4;">+ заметка</span>'}</small></td>
                <td style="font-size:13px;"><strong>${formatPrice(item.actual_qty * item.valuation_rate)}</strong></td>
                <td onclick="event.stopPropagation()"><small class="editable-note" style="color:var(--lr-info);cursor:pointer;" onclick="editLink('${item.item_code}', this)" title="Нажмите чтобы редактировать">${item.link ? `<a href="${escHtml(item.link)}" target="_blank" onclick="event.stopPropagation()" style="font-size:12px;"><i class="ti ti-external-link"></i> ссылка</a>` : '<span style="opacity:0.4;">+ ссылка</span>'}</small></td>
                ${Auth.isAdmin() ? `<td class="text-end" onclick="event.stopPropagation()">${actionBtns}</td>` : ''}
            </tr>
        `;
    }).join('');
}

// ===== Product detail =====
function openProduct(code) {
    const item = allItems.find(i => i.item_code === code);
    if (!item) return;
    currentDetailCode = code;
    const hasImg = !!item.image;
    const canEdit = Auth.isAdmin();

    document.getElementById('product-modal-content').innerHTML = `
        <div class="modal-header">
            <h5 class="modal-title">${escHtml(item.item_name)}</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
            <div class="row">
                <div class="col-md-5">
                    <div class="product-detail-gallery">
                        ${hasImg
                            ? `<img src="${API.imgUrl(item.image)}" onclick="openLightbox('${API.imgUrl(item.image)}')">`
                            : `<div style="aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:64px;color:var(--lr-text-muted);background:var(--lr-bg);cursor:pointer;" onclick="triggerPhotoUpload()"><i class="ti ti-camera-plus"></i></div>`}
                    </div>
                    <div class="d-flex gap-2 mt-2">
                        <button class="btn btn-sm btn-outline-secondary flex-fill" onclick="triggerPhotoUpload()"><i class="ti ti-camera"></i> ${hasImg ? 'Заменить' : 'Загрузить'}</button>
                        ${hasImg && canEdit ? `<button class="btn btn-sm btn-outline-danger" onclick="deleteCurrentPhoto()"><i class="ti ti-trash"></i></button>` : ''}
                    </div>
                </div>
                <div class="col-md-7">
                    <div class="text-muted small mb-2">Код: ${item.item_code}</div>
                    <div class="product-detail-price">${formatPrice(item.valuation_rate)}</div>
                    <div class="product-detail-availability">
                        <span class="avail-dot green"></span>
                        <strong>${item.actual_qty} шт.</strong>
                    </div>
                    <table class="table table-sm mt-3 mb-0">
                        <tr><td class="text-muted">Ответственный</td><td>${item.responsible || '—'}</td></tr>
                        <tr><td class="text-muted">Локация</td><td>${item.locация || '—'}</td></tr>
                        ${item.notes ? `<tr><td class="text-muted">Примечание</td><td>${escHtml(item.notes)}</td></tr>` : ''}
                    </table>
                    ${canEdit ? `
                    <div class="d-flex gap-2 mt-3">
                        <button class="btn btn-outline-warning flex-fill" onclick="openWriteOff('${item.item_code}','${escHtml(item.item_name).replace(/'/g,"\\'")}','${item.warehouse}',${item.actual_qty})"><i class="ti ti-file-minus"></i> Продано / Списать</button>
                        <button class="btn btn-danger" onclick="confirmDelete('${item.item_code}','${escHtml(item.item_name).replace(/'/g,"\\'")}')"><i class="ti ti-trash"></i></button>
                    </div>` : ''}
                    <div id="item-audit"></div>
                </div>
            </div>
        </div>
    `;
    new bootstrap.Modal(document.getElementById('product-modal')).show();
    loadItemAudit(code, 'item-audit');
}

// ===== Inline editing =====
async function editNote(code, el) {
    const item = allItems.find(i => i.item_code === code);
    const newNote = prompt('Примечание:', item ? item.notes || '' : '');
    if (newNote === null) return;
    try {
        await API.update('Item', code, { custom_notes: newNote.trim() });
        toast('Сохранено', 'success');
        await loadData();
    } catch (e) { toast('Ошибка: ' + (e.message || '').substring(0, 40), 'error'); }
}

async function editLocation(code, el) {
    const item = allItems.find(i => i.item_code === code);
    const newVal = prompt('Место хранения:', item ? item.locация || '' : '');
    if (newVal === null) return;
    try {
        await API.update('Item', code, { 'custom_locация': newVal.trim() });
        toast('Сохранено', 'success');
        await loadData();
    } catch (e) { toast('Ошибка: ' + (e.message || '').substring(0, 40), 'error'); }
}

async function editLink(code, el) {
    const item = allItems.find(i => i.item_code === code);
    const newVal = prompt('Ссылка (URL):', item ? item.link || '' : '');
    if (newVal === null) return;
    try {
        const meta = Meta.get(code) || {};
        Meta.set(code, { ...meta, link: newVal.trim() });
        toast('Сохранено', 'success');
        await loadData();
    } catch (e) { toast('Ошибка: ' + (e.message || '').substring(0, 40), 'error'); }
}

function uploadPhotoFor(code) {
    currentDetailCode = code;
    document.getElementById('detail-photo-input').click();
}

// ===== Add =====
function openAddModal() {
    const s = getSettings();
    document.getElementById('aa-responsible').innerHTML = '<option value="">—</option>' + s.responsible.map(r => `<option value="${r}">${r}</option>`).join('');
    document.getElementById('aa-name').value = '';
    document.getElementById('aa-qty').value = 1;
    document.getElementById('aa-price').value = '';
    document.getElementById('aa-location').value = '';
    document.getElementById('aa-notes').value = '';
    document.getElementById('aa-photo-preview').style.display = 'none';
    document.getElementById('aa-photo').value = '';
    new bootstrap.Modal(document.getElementById('add-vykup-modal')).show();
}

function previewPhoto(input) {
    const preview = document.getElementById('aa-photo-preview');
    if (input.files && input.files[0]) {
        const r = new FileReader();
        r.onload = e => { preview.src = e.target.result; preview.style.display = 'block'; };
        r.readAsDataURL(input.files[0]);
    }
}

async function submitAdd(e) {
    e.preventDefault();
    const name = document.getElementById('aa-name').value.trim();
    const qty = document.getElementById('aa-qty').value;
    const price = document.getElementById('aa-price').value;
    const location = document.getElementById('aa-location').value.trim();
    const responsible = document.getElementById('aa-responsible').value;
    const notes = document.getElementById('aa-notes').value.trim();
    const photoFile = document.getElementById('aa-photo').files[0];
    const code = generateItemCode(name);

    try {
        toast('Создание...', '');
        const itemRes = await API.create('Item', {
            item_code: code, item_name: name, item_group: 'Запчасти',
            stock_uom: 'Nos', is_stock_item: 1,
            custom_notes: notes,
            'custom_locация': location || 'ВЫКУП',
            custom_responsible: responsible || undefined
        });
        if (itemRes.exception) throw new Error(itemRes.exception);

        if (photoFile) {
            const upRes = await API.uploadFile(photoFile, code);
            if (upRes.message && upRes.message.file_url) {
                await API.update('Item', code, { image: upRes.message.file_url });
            }
        }

        const seRes = await API.create('Stock Entry', {
            stock_entry_type: 'Material Receipt',
            to_warehouse: 'Основной склад - L',
            company: 'LabRemonta',
            remarks: `Выкуп склад: ${notes || name}`,
            items: [{
                item_code: code, qty: parseFloat(qty), basic_rate: parseFloat(price),
                t_warehouse: 'Основной склад - L'
            }]
        });
        if (seRes.exception) throw new Error(seRes.exception);
        await API.update('Stock Entry', seRes.data.name, { docstatus: 1 });

        toast('Добавлено!', 'success');
        bootstrap.Modal.getInstance(document.getElementById('add-vykup-modal')).hide();
        loadData();
    } catch (err) {
        toast('Ошибка: ' + (err.message || '').substring(0, 60), 'error');
    }
}

// ===== Write-off =====
function openWriteOff(code, name, warehouse, qty) {
    document.getElementById('awo-code').value = code;
    document.getElementById('awo-warehouse').value = warehouse;
    document.getElementById('awo-name').value = name;
    document.getElementById('awo-qty').value = 1;
    document.getElementById('awo-qty').max = qty;
    document.getElementById('awo-reason').value = 'Продано';
    new bootstrap.Modal(document.getElementById('writeoff-vykup-modal')).show();
}

async function submitWriteOff(e) {
    e.preventDefault();
    const code = document.getElementById('awo-code').value;
    const wh = document.getElementById('awo-warehouse').value;
    const qty = parseInt(document.getElementById('awo-qty').value);
    const reason = document.getElementById('awo-reason').value.trim();
    try {
        toast('Списание...', '');
        await transferItem(code, wh, 'Списан - L', qty, reason);
        toast('Списано!', 'success');
        bootstrap.Modal.getInstance(document.getElementById('writeoff-vykup-modal')).hide();
        bootstrap.Modal.getInstance(document.getElementById('product-modal'))?.hide();
        loadData();
    } catch (err) {
        toast('Ошибка: ' + (err.message || '').substring(0, 60), 'error');
    }
}

// ===== Delete =====
function confirmDelete(code, name) {
    if (!Auth.isAdmin()) return;
    if (!confirm(`Удалить "${name}"?`)) return;
    performDelete(code);
}

async function performDelete(code) {
    toast('Удаление...', '');
    try {
        await deleteItemCompletely(code);
        await new Promise(r => setTimeout(r, 500));
        bootstrap.Modal.getInstance(document.getElementById('product-modal'))?.hide();
        await loadData();
        toast('Удалено', 'success');
    } catch (e) { toast('Ошибка удаления', 'error'); }
}

// ===== Photo =====
function triggerPhotoUpload() { document.getElementById('detail-photo-input').click(); }

async function uploadPhotoForCurrent(input) {
    if (!input.files || !input.files[0] || !currentDetailCode) return;
    try {
        toast('Загрузка...', '');
        const up = await API.uploadFile(input.files[0], currentDetailCode);
        if (up.message && up.message.file_url) {
            await API.update('Item', currentDetailCode, { image: up.message.file_url });
            toast('Фото загружено', 'success');
            await loadData();
            openProduct(currentDetailCode);
        }
    } catch (e) { toast('Ошибка', 'error'); }
    input.value = '';
}

async function deleteCurrentPhoto() {
    if (!currentDetailCode || !confirm('Удалить фото?')) return;
    try {
        await API.update('Item', currentDetailCode, { image: '' });
        toast('Фото удалено', 'success');
        await loadData();
        openProduct(currentDetailCode);
    } catch (e) { toast('Ошибка', 'error'); }
}

function openLightbox(url) {
    document.getElementById('lightbox-img').src = url;
    document.getElementById('lightbox').classList.add('active');
}

// ===== Export =====
function exportCSV() {
    if (!vykupItems.length) { toast('Нечего экспортировать', 'error'); return; }
    const hdr = ['Название', 'Код', 'Кол-во', 'Цена', 'Сумма', 'Ответственный', 'Примечание'];
    const rows = vykupItems.map(i => [
        i.item_name, i.item_code, i.actual_qty, i.valuation_rate,
        i.actual_qty * i.valuation_rate, i.responsible || '', i.notes || ''
    ]);
    const csv = [hdr, ...rows].map(r => r.map(c => `"${String(c).replace(/"/g, '""')}"`).join(',')).join('\n');
    const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = `выкуп_${new Date().toISOString().split('T')[0]}.csv`;
    link.click();
    toast('Экспортировано', 'success');
}

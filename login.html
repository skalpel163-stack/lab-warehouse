<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Вход — Лаборатория Ремонта</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/core@1.0.0-beta20/dist/css/tabler.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.12.0/dist/tabler-icons.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/brand.css">
<style>
    body {
        background:
            radial-gradient(ellipse 80% 40% at 50% -10%, rgba(0, 200, 83, 0.12), transparent),
            #f7f8fa;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .login-card {
        background: #ffffff;
        border-radius: 16px;
        padding: 40px;
        width: 100%;
        max-width: 420px;
        border: 1px solid #ebedf0;
        box-shadow: 0 20px 60px rgba(0,0,0,0.06);
    }
    .login-logo {
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 22px;
    }
    .login-logo svg { width: 64px; height: 64px; }
    .login-title {
        text-align: center;
        font-weight: 900;
        font-size: 20px;
        color: #00c853;
        letter-spacing: -0.01em;
        font-style: italic;
        text-transform: uppercase;
        margin-bottom: 4px;
    }
    .login-title-2 {
        text-align: center;
        font-weight: 900;
        font-size: 20px;
        color: #00c853;
        letter-spacing: -0.01em;
        font-style: italic;
        text-transform: uppercase;
        margin-bottom: 10px;
    }
    .login-sub {
        text-align: center;
        color: #8a94a6;
        font-size: 12px;
        margin-bottom: 28px;
    }
    .demo-accounts {
        margin-top: 24px;
        padding-top: 20px;
        border-top: 1px solid #ebedf0;
        font-size: 11.5px;
        color: #8a94a6;
    }
    .demo-accounts strong {
        color: #4a5568;
        font-weight: 700;
        display: block;
        margin-bottom: 10px;
        font-size: 10.5px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
    }
    .quick-login {
        display: inline-block;
        padding: 5px 10px;
        background: #f7f8fa;
        border: 1px solid #ebedf0;
        border-radius: 8px;
        margin: 3px;
        cursor: pointer;
        font-family: 'SF Mono', Monaco, Consolas, monospace;
        font-size: 10.5px;
        color: #4a5568;
        transition: all 0.12s ease;
    }
    .quick-login:hover {
        background: #00c853;
        color: #fff;
        border-color: #00c853;
    }
</style>
</head>
<body>

<div class="login-card">
    <div class="login-logo">
        <svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#00c853" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="20" y1="38" x2="20" y2="14"/>
            <line x1="20" y1="22" x2="11" y2="16"/>
            <line x1="20" y1="22" x2="29" y2="16"/>
            <line x1="20" y1="16" x2="14" y2="10"/>
            <line x1="20" y1="16" x2="26" y2="10"/>
            <line x1="20" y1="14" x2="20" y2="8.5"/>
            <circle cx="11" cy="16" r="2" fill="#00c853" stroke="none"/>
            <circle cx="29" cy="16" r="2" fill="#00c853" stroke="none"/>
            <circle cx="14" cy="10" r="2" fill="#00c853" stroke="none"/>
            <circle cx="26" cy="10" r="2" fill="#00c853" stroke="none"/>
            <circle cx="20" cy="6" r="2.5" fill="#00c853" stroke="none"/>
        </svg>
    </div>
    <div class="login-title">Лаборатория</div>
    <div class="login-title-2">Ремонта</div>
    <div class="login-sub">Система управления складом</div>

    <form onsubmit="handleLogin(event)">
        <div class="mb-3">
            <label class="form-label">Логин</label>
            <input type="text" class="form-control" id="login" placeholder="admin" required autofocus>
        </div>
        <div class="mb-3">
            <label class="form-label">Пароль</label>
            <input type="password" class="form-control" id="password" placeholder="••••" required>
        </div>
        <div id="error-msg" class="alert alert-danger" style="display:none;"></div>
        <button type="submit" class="btn btn-primary w-100">
            Войти
        </button>
    </form>

    <div class="demo-accounts">
        <strong>Демо-аккаунты</strong>
        <div>
            <span class="quick-login" onclick="quickLogin('admin','admin123')">admin / admin123</span>
            <span class="quick-login" onclick="quickLogin('stebaev','1234')">stebaev</span>
            <span class="quick-login" onclick="quickLogin('arsenyuk','1234')">arsenyuk</span>
            <span class="quick-login" onclick="quickLogin('grichenko','1234')">grichenko</span>
            <span class="quick-login" onclick="quickLogin('ermakovich','1234')">ermakovich</span>
            <span class="quick-login" onclick="quickLogin('balandin','1234')">balandin</span>
            <span class="quick-login" onclick="quickLogin('sopkin','1234')">sopkin</span>
        </div>
    </div>
</div>

<script src="assets/auth.js"></script>
<script>
// Redirect if already logged in
if (Auth.user) location.href = 'index.html';

function handleLogin(e) {
    e.preventDefault();
    const login = document.getElementById('login').value.trim();
    const pass = document.getElementById('password').value;
    const res = Auth.login(login, pass);
    if (res.ok) {
        location.href = 'index.html';
    } else {
        const err = document.getElementById('error-msg');
        err.textContent = res.error;
        err.style.display = 'block';
    }
}

function quickLogin(login, pass) {
    document.getElementById('login').value = login;
    document.getElementById('password').value = pass;
    document.querySelector('form').dispatchEvent(new Event('submit', { cancelable: true }));
}
</script>
</body>
</html>
